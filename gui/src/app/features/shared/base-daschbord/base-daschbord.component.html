<div class="dashboard-wrapper">
  <div class="mobile-header">
    <button class="hamburger-btn" (click)="toggleSidebar()">
      <fa-icon [icon]="sidebarOpen ? faXmark : faBars"></fa-icon>
    </button>
    <span class="mobile-title">{{ accountTitle }}</span>
  </div>

  <div class="overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

  <div class="dashboard-layout">
    <aside class="sidebar" [class.open]="sidebarOpen">
      <div class="sidebar-user">
        <div class="avatar">
          <fa-icon [icon]="userAvatarIcon"></fa-icon>
        </div>
        <div class="user-info">
          <span class="user-name">{{ accountTitle }}</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a *ngFor="let item of navItems" [routerLink]="item.route" class="nav-item" routerLinkActive="active"
          (click)="closeSidebar()">
          <fa-icon [icon]="item.icon"></fa-icon>
          <span>{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
